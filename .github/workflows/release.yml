name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false
      - name: gofmt
        run: |
          set -euo pipefail
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt failed:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./... -count=1 -race
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: npm package smoke
        run: |
          node -c bin/install.js
          sh -n bin/ldgr
          npm pack --dry-run

  build:
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          out="dist/ldgr_${version}_${GOOS}_${GOARCH}"
          mkdir -p "$out"
          go build -trimpath -ldflags "-s -w" -o "$out/ldgr" .
          cp README.md LICENSE "$out/"
          tar -C dist -czf "${out}.tar.gz" "$(basename "$out")"
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ldgr_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: checksums
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS
      - name: attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm publish --access public
